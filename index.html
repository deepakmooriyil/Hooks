      text-align: center;
      overflow: hidden;

      position: absolute; inset: 0;
      background:

      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e94560;
      margin-bottom: 18px;
      font-family: 'DM Mono', monospace;

      letter-spacing: 0;

  "Relatability":      { accent: "#cc44ff", light: "#e080ff" },
  "Lists & Frameworks":{ accent: "#00cccc", light: "#4deeee" },
  "Story-Based":       { accent: "#f0c040", light: "#f5d878" },
  "Numbers & Data":    { accent: "#00e676", light: "#5cf599" },
  "Pattern Interrupt": { accent: "#ff1493", light: "#ff69b4" },
};

// --- Helpers ---
function hexToRgb(hex) {
  const m = hex.replace('#','').match(/.{2}/g);
  return m.map(x => parseInt(x, 16)).join(',');
}

// --- State ---
let activeCategory = "All";
let searchQuery = "";
let showWhy = {};
let copiedId = null;

// --- Elements ---
const tabsEl   = document.getElementById('tabs');
const listEl   = document.getElementById('hooks-list');
const countEl  = document.getElementById('count');
const searchEl = document.getElementById('search');

// --- Render categories ---
const categories = ["All", ...Object.keys(categoryColors)];
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (cat === 'All' ? ' active' : '');
  btn.textContent = cat;
  if (cat === 'All') {
    btn.style.borderColor = 'rgba(233,69,96,0.6)';
    btn.style.background  = 'rgba(233,69,96,0.15)';
    btn.style.color       = '#ff6b8a';
  }
  btn.addEventListener('click', () => {
    activeCategory = cat;
    updateTabs();
    renderHooks();
  });
  tabsEl.appendChild(btn);
});

function updateTabs() {
  document.querySelectorAll('.tab').forEach((btn, i) => {
    const cat = categories[i];
    const cc  = categoryColors[cat] || {};
    const isActive = cat === activeCategory;
    btn.classList.toggle('active', isActive);
    if (isActive && cc.accent) {
      btn.style.borderColor = cc.accent;
      btn.style.background  = `rgba(${hexToRgb(cc.accent)}, 0.18)`;
      btn.style.color       = cc.light;
    } else if (isActive) {
      btn.style.borderColor = 'rgba(233,69,96,0.6)';
      btn.style.background  = 'rgba(233,69,96,0.15)';
      btn.style.color       = '#ff6b8a';
    } else {
      btn.style.borderColor = '';
      btn.style.background  = '';
      btn.style.color       = '';
    }
  });
}

// --- Render hooks ---
function renderHooks() {
  const q = searchQuery.toLowerCase();
  const filtered = hooks.filter(h => {
    const matchCat    = activeCategory === 'All' || h.category === activeCategory;
    const matchSearch = h.hook.toLowerCase().includes(q) || h.category.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  countEl.textContent = filtered.length;
  listEl.innerHTML = '';

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="no-results">No hooks match your search. Try a different term.</div>';
    return;
  }

  filtered.forEach((hook, idx) => {
    const cc = categoryColors[hook.category] || { accent: '#7b68ee', light: '#a090ff' };
    const rgb = hexToRgb(cc.accent);

    const card = document.createElement('div');
    card.className = 'hook-card';
    card.style.borderLeftColor = cc.accent;
    card.style.animationDelay  = `${Math.min(idx * 18, 300)}ms`;

    card.innerHTML = `
      <div class="hook-inner">
        <span class="hook-num" style="background:rgba(${rgb},0.18);color:${cc.light}">${hook.id}</span>
        <div class="hook-body">
          <div class="hook-cat" style="color:${cc.accent}">${hook.category}</div>
          <div class="hook-text">"${hook.hook}"</div>
          <div class="why-box${showWhy[hook.id] ? ' visible' : ''}"
               id="why-${hook.id}"
               style="background:rgba(${rgb},0.08);border:1px solid rgba(${rgb},0.22);color:${cc.light}">
            🧠 <strong>Why it works:</strong> ${hook.why}
          </div>
          <div class="hook-actions">
            <button class="btn copy-btn" id="copy-${hook.id}" data-id="${hook.id}" data-text="${escapeAttr(hook.hook)}">
              ${copiedId === hook.id ? '✓ Copied!' : 'Copy Hook'}
            </button>
            <button class="btn why-btn${showWhy[hook.id] ? ' why-active' : ''}"
                    id="why-btn-${hook.id}" data-id="${hook.id}"
                    style="${showWhy[hook.id] ? `background:rgba(${rgb},0.18);border-color:${cc.accent};color:${cc.light}` : ''}">
              🧠 ${showWhy[hook.id] ? 'Hide Why' : 'Why it works'}
            </button>
          </div>
        </div>
      </div>
    `;

    listEl.appendChild(card);
  });

  // Event delegation
  listEl.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id   = parseInt(btn.dataset.id);
      const text = btn.dataset.text;
      navigator.clipboard.writeText(text).catch(() => {});
      copiedId = id;
      btn.textContent = '✓ Copied!';
      const cc = categoryColors[hooks.find(h=>h.id===id)?.category] || {};
      if (cc.accent) {
        btn.style.borderColor = cc.accent;
        btn.style.background  = `rgba(${hexToRgb(cc.accent)},0.25)`;
        btn.style.color       = cc.light;
      }
      setTimeout(() => {
        copiedId = null;
        btn.textContent = 'Copy Hook';
        btn.style.borderColor = '';
        btn.style.background  = '';
        btn.style.color       = '';
      }, 1800);
    });
  });

  listEl.querySelectorAll('.why-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id);
      showWhy[id] = !showWhy[id];
      const whyBox = document.getElementById(`why-${id}`);
      const hook   = hooks.find(h => h.id === id);
      const cc     = categoryColors[hook?.category] || { accent: '#7b68ee', light: '#a090ff' };
      const rgb    = hexToRgb(cc.accent);
      if (showWhy[id]) {
        whyBox.classList.add('visible');
        btn.classList.add('why-active');
        btn.style.background   = `rgba(${rgb},0.18)`;
        btn.style.borderColor  = cc.accent;
        btn.style.color        = cc.light;
        btn.textContent        = '🧠 Hide Why';
      } else {
        whyBox.classList.remove('visible');
        btn.classList.remove('why-active');
        btn.style.background  = '';
        btn.style.borderColor = '';
        btn.style.color       = '';
        btn.textContent       = '🧠 Why it works';
      }
    });
  });
}

function escapeAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// --- Search ---
searchEl.addEventListener('input', () => {
  searchQuery = searchEl.value;
  renderHooks();
});

// --- Init ---
renderHooks();
</script>
</body>
</html>
